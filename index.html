<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contrôle ESP32‑CAM — Dark</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    /* Variables principales */
    :root { 
      --card-radius: 12px; 
      --btn-size: 3.6rem; /* boutons un peu plus grands pour mobile */
    }

    /* Style de base */
    html, body { 
      height:100%; 
      background:#0b1220; 
      color:#e6eef8; 
      font-family:Arial, sans-serif;
    }

    /* Conteneur principal centré */
    .app-wrap { 
      min-height:100vh; 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      padding:1rem; 
    }

    /* Carte de contrôle */
    .control-card { 
      width:100%; 
      max-width:420px; /* largeur réduite pour mobile */
      border-radius:var(--card-radius); 
      padding:1.25rem;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border:1px solid rgba(255,255,255,0.04); 
      box-shadow:0 6px 30px rgba(2,8,23,0.6);
    }

    /* Titres */
    h1 { font-size:1.25rem; margin:0; font-weight:600; }
    .subtitle { color:#9fb2d9; font-size:.9rem; }

    /* Grille des boutons directionnels */
    .btn-grid { 
      display:grid; 
      gap:.6rem; 
      grid-template-columns:1fr 1fr 1fr; 
      margin-top:1rem; 
      align-items:center; 
    }

    /* Boutons */
    .btn-large { 
      height:var(--btn-size); 
      font-size:1rem; 
      border-radius:10px; 
      display:flex; 
      align-items:center; 
      justify-content:center; 
    }

    /* Centre de la grille (caméra) */
    .grid-center { 
      display:flex; 
      align-items:center; 
      justify-content:center; 
    }

    /* Zone de statut */
    .status { 
      margin-top:1rem; 
      padding:.5rem .75rem; 
      border-radius:8px; 
      background:rgba(255,255,255,0.02); 
      color:#bcd4ff; 
      font-size:.95rem; 
      min-height:2.2rem; 
      display:flex; 
      align-items:center; 
    }

    .status .error { color:#ff9b9b; } 
    .status .ok { color:#8ef0c2; }

    /* Ligne IP et base URL */
    .ip-row { 
      gap:.5rem; 
      margin-top:.75rem; 
      align-items:center; 
      flex-wrap:wrap; 
    }

    .form-control-dark { 
      background:#07111b; 
      color:#dfeeff; 
      border:1px solid rgba(255,255,255,0.04); 
      flex:1;
    }

    /* Responsivité mobile */
    @media (max-width:576px){
      .btn-grid { grid-template-columns:1fr 1fr; } /* 2 colonnes sur mobile */
      .grid-center { grid-column: 1 / -1; } /* centre sur toute la largeur */
      .btn-large { font-size:.95rem; height:3rem; } /* boutons plus petits */
    }

  </style>
</head>
<body>
  <div class="app-wrap">
    <div class="control-card">
      <!-- Entête -->
      <div class="d-flex align-items-start justify-content-between">
        <div>
          <h1>Contrôle ESP32‑CAM</h1>
          <div class="subtitle">Mode sombre — Interface LAN</div>
        </div>
        <div class="text-end small-note" style="color:#9fb2d9;">
          <div>Méthode : GET</div>
        </div>
      </div>

      <!-- Entrée de l'IP / Base URL -->
      <div class="d-flex ip-row mt-3">
        <input id="input-base" class="form-control form-control-dark" type="text" placeholder="http://192.168.4.1" />
        <button id="btn-save-base" class="btn btn-outline-light">Save</button>
        <button id="btn-reset-base" class="btn btn-outline-secondary">Reset</button>
      </div>

      <!-- Grille des boutons -->
      <div class="btn-grid" role="group" aria-label="Contrôles directionnels">
        <div class="grid-center"></div>
        <div class="grid-center">
          <button id="btn-up" class="btn btn-primary btn-large w-100"><i class="bi bi-arrow-up-circle me-2"></i>Up</button>
        </div>
        <div class="grid-center"></div>

        <div>
          <button id="btn-left" class="btn btn-outline-light btn-large w-100"><i class="bi bi-arrow-left-circle me-2"></i>Left</button>
        </div>

        <div class="grid-center">
          <div class="text-center" style="opacity:.95;">
            <i class="bi bi-camera-video" style="font-size:1.6rem"></i>
            <div style="font-size:.8rem; color:#9fb2d9;">ESP32 Camera</div>
          </div>
        </div>

        <div>
          <button id="btn-right" class="btn btn-outline-light btn-large w-100">Right<i class="bi bi-arrow-right-circle ms-2"></i></button>
        </div>

        <div class="grid-center"></div>
        <div class="grid-center">
          <button id="btn-down" class="btn btn-primary btn-large w-100"><i class="bi bi-arrow-down-circle me-2"></i>Down</button>
        </div>
        <div class="grid-center"></div>

        <!-- Boutons moteur -->
        <div class="d-grid gap-2">
          <button id="btn-start" class="btn btn-success btn-large"><i class="bi bi-play-circle me-2"></i>Start motor</button>
        </div>
        <div class="d-grid gap-2">
          <button id="btn-stop" class="btn btn-danger btn-large"><i class="bi bi-stop-circle me-2"></i>Stop motor</button>
        </div>
        <div class="grid-center"></div>
      </div>

      <!-- Statut -->
      <div class="status mt-3" id="status"><span class="ok">Statut : prêt</span></div>

      <!-- Pied de page -->
      <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap">
        <div style="color:#9fb2d9; font-size:.88rem;">Conseil : être connecté au même Wi‑Fi que l'ESP32.</div>
        <div>
          <button id="btn-test" class="btn btn-outline-secondary btn-sm">Test connexion</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ================================
    // Variables et configuration
    // ================================
    const DEFAULT_BASE = 'http://192.168.95.1:8080';
    const ENDPOINTS = {
      up:    '/up/cliked',
      down:  '/down/cliked',
      left:  '/left/clicked',
      right: '/right/clicked',
      start: '/start/motor',
      stop:  '/start/off'
    };

    // ================================
    // Éléments du DOM
    // ================================
    const inputBase = document.getElementById('input-base');
    const btnSaveBase = document.getElementById('btn-save-base');
    const btnResetBase = document.getElementById('btn-reset-base');
    const btnUp = document.getElementById('btn-up');
    const btnDown = document.getElementById('btn-down');
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');
    const btnStart = document.getElementById('btn-start');
    const btnStop = document.getElementById('btn-stop');
    const btnTest = document.getElementById('btn-test');
    const elStatus = document.getElementById('status');

    // ================================
    // Gestion de l'URL de base
    // ================================
    function loadBase() {
      const saved = localStorage.getItem('esp_base');
      const base = saved ? saved : DEFAULT_BASE;
      inputBase.value = base;
      return base;
    }
    function saveBase(val) { localStorage.setItem('esp_base', val); }
    function resetBase() {
      localStorage.removeItem('esp_base');
      inputBase.value = DEFAULT_BASE;
    }

    let BASE = loadBase();

    // ================================
    // Fonctions utilitaires UI
    // ================================
    function setStatus(text, type='info') {
      elStatus.textContent = '';
      const span = document.createElement('span');
      if (type === 'error') span.className = 'error';
      else if (type === 'ok') span.className = 'ok';
      span.textContent = 'Statut : ' + text;
      elStatus.appendChild(span);
    }

    function setButtonsDisabled(disabled) {
      [btnUp, btnDown, btnLeft, btnRight, btnStart, btnStop, btnTest, btnSaveBase, btnResetBase].forEach(b => b.disabled = disabled);
    }

    // ================================
    // Fonction pour appeler l'API ESP32
    // ================================
    async function callEndpoint(path) {
      const url = BASE.replace(/\/$/, '') + path;
      setButtonsDisabled(true);
      setStatus('Envoi à ' + url + ' …', 'info');
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 7000);
        const res = await fetch(url, { method: 'GET', cache:'no-store', signal: controller.signal });
        clearTimeout(timeout);
        let body = '';
        try { body = await res.text(); } catch {}
        if (!res.ok) {
          setStatus('Erreur HTTP ' + res.status + (body ? ' — ' + body : ''), 'error');
        } else {
          setStatus('Réponse ' + res.status + (body ? ' — ' + body : ''), 'ok');
        }
      } catch (err) {
        if (err.name === 'AbortError') setStatus('Timeout (7s)', 'error');
        else setStatus('Erreur réseau: ' + err.message, 'error');
        console.error(err);
      } finally {
        setButtonsDisabled(false);
      }
    }

    // ================================
    // Événements
    // ================================
    btnSaveBase.addEventListener('click', () => {
      const val = inputBase.value.trim();
      if (!val) return;
      BASE = val;
      saveBase(val);
      setStatus('Base enregistrée : ' + BASE, 'ok');
    });
    btnResetBase.addEventListener('click', () => {
      resetBase();
      BASE = loadBase();
      setStatus('Base réinitialisée : ' + BASE, 'ok');
    });

    btnUp.addEventListener('click', () => callEndpoint(ENDPOINTS.up));
    btnDown.addEventListener('click', () => callEndpoint(ENDPOINTS.down));
    btnLeft.addEventListener('click', () => callEndpoint(ENDPOINTS.left));
    btnRight.addEventListener('click', () => callEndpoint(ENDPOINTS.right));
    btnStart.addEventListener('click', () => callEndpoint(ENDPOINTS.start));
    btnStop.addEventListener('click', () => callEndpoint(ENDPOINTS.stop));
    btnTest.addEventListener('click', () => callEndpoint('/'));

    // Support clavier (flèches et espace)
    document.addEventListener('keydown', (e) => {
      if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
      switch (e.key) {
        case 'ArrowUp': e.preventDefault(); btnUp.click(); break;
        case 'ArrowDown': e.preventDefault(); btnDown.click(); break;
        case 'ArrowLeft': e.preventDefault(); btnLeft.click(); break;
        case 'ArrowRight': e.preventDefault(); btnRight.click(); break;
        case ' ': e.preventDefault(); btnStart.click(); break;
        case 's': case 'S': btnStop.click(); break;
      }
    });

    // Initialisation du statut
    setStatus('Prêt — base: ' + BASE, 'ok');
  </script>
</body>
</html>
